name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AdminkaSim.slnx

      - name: Build (warnings are errors)
        run: dotnet build AdminkaSim.slnx -c Release --no-restore

      - name: Test
        run: dotnet test AdminkaSim.slnx -c Release --no-build --verbosity normal
